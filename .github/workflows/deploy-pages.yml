name: Deploy to GitHub Pages

on:
  push:
    branches: [master]   #change according to main branch 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json  # helps cache better

      - name: Install dependencies
        working-directory: frontend               # ← ADD THIS
        run: npm ci

      - name: Build
        working-directory: frontend               # ← ADD THIS
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist                     # ← this path is correct

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
